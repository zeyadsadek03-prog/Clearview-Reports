<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clearview Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --font-size: 16px;
      --background: #F6F4EE;
      --foreground: #111111;
      --card: #FFFFFF;
      --card-foreground: #111111;
      --popover: #FFFFFF;
      --popover-foreground: #111111;
      --primary: #77C210;
      --primary-foreground: #0A0A0A;
      --secondary: #EDEAE2;
      --secondary-foreground: #111111;
      --muted: #E8E5DD;
      --muted-foreground: #6B6860;
      --accent: #EDEAE2;
      --accent-foreground: #111111;
      --destructive: #C0392B;
      --destructive-foreground: #ffffff;
      --border: rgba(0, 0, 0, 0.09);
      --input: transparent;
      --input-background: #EDEAE2;
      --ring: #77C210;
      --radius: 0.5rem;
      --font-weight-medium: 500;
      --font-weight-normal: 400;
    }

    .dark {
      --background: #000000;
      --foreground: #F0EFEB;
      --card: #0E0E0E;
      --card-foreground: #F0EFEB;
      --popover: #0E0E0E;
      --popover-foreground: #F0EFEB;
      --primary: #8B5CF6;
      --primary-foreground: #FFFFFF;
      --secondary: #1A1A1A;
      --secondary-foreground: #F0EFEB;
      --muted: #1A1A1A;
      --muted-foreground: #888580;
      --accent: #1A1A1A;
      --accent-foreground: #F0EFEB;
      --destructive: #E53E3E;
      --destructive-foreground: #FFFFFF;
      --border: rgba(255, 255, 255, 0.08);
      --input: #1A1A1A;
      --input-background: #1A1A1A;
      --ring: #8B5CF6;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--background);
      color: var(--foreground);
      font-size: var(--font-size);
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 0.35s ease both;
    }

    .font-mono, input, button {
      font-family: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    .min-h-screen { min-height: 100vh; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .py-10 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
    .sm\:py-16 { padding-top: 4rem; padding-bottom: 4rem; }
    .max-w-\[640px\] { max-width: 640px; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .mb-12 { margin-bottom: 3rem; }
    .mt-20 { margin-top: 5rem; }
    .pt-6 { padding-top: 1.5rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .space-y-2 > * + * { margin-top: 0.5rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .gap-2\\.5 { gap: 0.625rem; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .sm\:flex-row { flex-direction: row; }
    .flex-1 { flex: 1 1 0%; }
    .shrink-0 { flex-shrink: 0; }
    .hidden { display: none; }

    .text-center { text-align: center; }
    .text-xs { font-size: 0.75rem; }
    .text-sm { font-size: 0.875rem; }
    .text-xl { font-size: 1.25rem; }
    .font-medium { font-weight: 500; }
    .font-mono { font-family: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .uppercase { text-transform: uppercase; }
    .tracking-\[0\.18em\] { letter-spacing: 0.18em; }
    .tracking-widest { letter-spacing: 0.05em; }
    .leading-tight { line-height: 1.25; }
    .leading-relaxed { line-height: 1.625; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .py-5 { padding-top: 1.25rem; padding-bottom: 1.25rem; }
    .py-2\\.5 { padding-top: 0.625rem; padding-bottom: 0.625rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-1 { padding-left: 0.25rem; padding-right: 0.25rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .py-14 { padding-top: 3.5rem; padding-bottom: 3.5rem; }

    .rounded-xl { border-radius: 0.75rem; }
    .rounded-full { border-radius: 9999px; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-md { border-radius: 0.375rem; }
    .border { border: 1px solid var(--border); }
    .border-2 { border-width: 2px; }
    .border-dashed { border-style: dashed; }
    .border-b { border-bottom: 1px solid var(--border); }

    .bg-background { background-color: var(--background); }
    .bg-card { background-color: var(--card); }
    .bg-primary { background-color: var(--primary); }
    .bg-secondary { background-color: var(--secondary); }
    .bg-destructive\/10 { background-color: color-mix(in srgb, var(--destructive) 10%, transparent); }

    .text-foreground { color: var(--foreground); }
    .text-primary { color: var(--primary); }
    .text-muted-foreground { color: var(--muted-foreground); }
    .text-destructive { color: var(--destructive); }
    .text-primary-foreground { color: var(--primary-foreground); }
    .text-card-foreground { color: var(--card-foreground); }

    .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.07); }
    .shadow { box-shadow: 0 1px 3px 0 rgba(0,0,0,0.08), 0 1px 2px -1px rgba(0,0,0,0.08); }

    .w-full { width: 100%; }
    .w-9 { width: 2.25rem; }
    .w-4 { width: 1rem; }
    .w-5 { width: 1.25rem; }
    .w-3\\.5 { width: 0.875rem; }
    .w-\[6px\] { width: 6px; }
    .h-9 { height: 2.25rem; }
    .h-4 { height: 1rem; }
    .h-5 { height: 1.25rem; }
    .h-3\\.5 { height: 0.875rem; }
    .h-\[6px\] { height: 6px; }
    .mt-0\\.5 { margin-top: 0.125rem; }
    .mt-\[3px\] { margin-top: 3px; }
    .mt-12 { margin-top: 3rem; }
    .ml-1 { margin-left: 0.25rem; }

    input {
      background: var(--input-background);
      border: 1px solid var(--border);
      color: var(--foreground);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      outline: none;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    input::placeholder { color: var(--muted-foreground); }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--ring);
      border-color: transparent;
    }

    button {
      border: none;
      background: transparent;
      color: var(--foreground);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.5;
      transition: all 0.15s ease;
    }
    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .primary-btn {
      background: var(--primary);
      color: var(--primary-foreground);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      width: 100%;
    }
    .primary-btn:not(:disabled):hover {
      opacity: 0.92;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .primary-btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .icon-btn {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-foreground);
    }
    .icon-btn:hover {
      color: var(--foreground);
      border-color: var(--primary);
    }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow-sm);
    }
    .file-chip .remove {
      margin-left: 0.25rem;
      padding: 0.25rem;
      border-radius: var(--radius);
      color: var(--muted-foreground);
    }
    .file-chip .remove:hover {
      background: var(--muted);
      color: var(--foreground);
    }

    .upload-zone {
      width: 100%;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--card);
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 3.5rem 1.5rem;
      position: relative;
    }
    .upload-zone.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .upload-zone.drag-over {
      border-color: var(--primary);
      background: color-mix(in srgb, var(--primary) 6%, var(--card));
      transform: scale(1.01);
    }
    .upload-zone:hover:not(.disabled) {
      border-color: color-mix(in srgb, var(--border) 60%, var(--primary));
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .summary-card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.08), 0 4px 10px -6px rgba(0,0,0,0.06);
      overflow: hidden;
      transform: translateY(6px);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .summary-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    .summary-header {
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .summary-header .dot {
      width: 6px;
      height: 6px;
      border-radius: 9999px;
      background: var(--primary);
    }
    .summary-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .summary-body li {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: fade-in 0.4s ease both;
    }
    .summary-body li + li { margin-top: 0; }
    .summary-body li:nth-child(1) { animation-delay: 0ms; }
    .summary-body li:nth-child(2) { animation-delay: 80ms; }
    .summary-body li:nth-child(3) { animation-delay: 160ms; }
    .summary-body li:nth-child(4) { animation-delay: 240ms; }

    .email-panel {
      margin-top: 0.75rem;
      padding: 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow-sm);
    }
    .email-panel label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.75rem;
      color: var(--foreground);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .email-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    @media (min-width: 640px) {
      .email-form { flex-direction: row; }
    }
    .email-form input {
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--input-background);
      color: var(--foreground);
      flex: 1 1 0%;
      min-width: 220px;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
    }
    .send-btn {
      border-radius: 9999px;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--primary);
      color: var(--primary-foreground);
    }
    .send-btn:not(:disabled):hover {
      opacity: 0.92;
    }
    .send-btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .error-banner {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--destructive) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--destructive) 25%, transparent);
      color: var(--destructive);
    }
    .error-banner button {
      color: color-mix(in srgb, var(--destructive) 60%, transparent);
      padding: 0.25rem;
    }
    .error-banner button:hover { color: var(--destructive); }

    .status {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-left: 0.25rem;
    }
    .status.show { display: block; }

    footer {
      max-width: 640px;
      margin: 5rem auto 0;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    footer p {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }
  </style>
</head>
<body>
  <div class="min-h-screen bg-background px-4 py-10 sm:py-16">
    <header class="max-w-[640px] mx-auto flex items-center justify-between mb-12">
      <div>
        <span class="font-mono text-xs font-medium tracking-[0.18em] uppercase text-muted-foreground block">
          Insight
        </span>
        <h1 class="font-mono text-xl font-medium text-foreground leading-tight mt-0.5">Clearview Reports</h1>
      </div>
      <button
        class="icon-btn"
        id="themeToggle"
        aria-label="Toggle theme"
      >
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="sunIcon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42"/></svg>
      </button>
    </header>

    <main class="max-w-[640px] mx-auto space-y-4">
      <div
        class="upload-zone"
        id="upload"
        role="button"
        tabindex="0"
        aria-label="Upload CSV file"
      >
        <input type="file" id="fileInput" accept=".csv,text/csv" />
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="text-center">
          <p class="text-sm font-medium text-foreground" id="uploadText">Drop your CSV here</p>
          <p class="mt-0.5 text-xs font-mono text-muted-foreground">or click to browse</p>
        </div>
      </div>

      <div id="fileChip" class="file-chip" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-primary shrink-0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="flex-1 text-sm font-mono text-foreground truncate" id="fileName"></span>
        <span class="text-xs font-mono text-muted-foreground shrink-0" id="fileSize"></span>
        <button class="ml-1 p-1 rounded-md hover:bg-muted transition-colors text-muted-foreground hover:text-foreground" id="clearBtn" aria-label="Remove file">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div id="errorBanner" class="error-banner" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p class="flex-1 text-sm" id="errorMsg"></p>
        <button id="dismissError">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <p class="status" id="status" style="display: none;"></p>

      <button class="primary-btn" id="goBtn" disabled>Summarize</button>

      <div class="summary-card" id="summaryCard">
        <div class="summary-header">
          <span class="dot"></span>
          <span class="text-xs font-mono font-medium text-muted-foreground uppercase tracking-widest">Performance Summary</span>
        </div>
        <ul class="summary-body" id="summaryList"></ul>
      </div>

            <div class="brand-panel" id="brandPanel" style="display: none;">
        <label class="font-mono text-xs font-medium uppercase tracking-widest text-muted-foreground" style="display: block; margin-bottom: 0.75rem;">Brand your report</label>
        <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;">
          <input type="text" id="companyName" placeholder="Company name" class="flex-1" style="min-width: 180px;" />
          <input type="color" id="brandColor" value="#1e40af" style="width: 44px; height: 44px; padding: 4px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; background: var(--input-background);" />
          <input type="file" id="logoInput" accept="image/*" style="display: none;" />
          <button type="button" id="logoBtn" style="border-radius: 9999px; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; border: 1px solid var(--border); background: var(--card); color: var(--foreground); cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2 2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload logo
          </button>
          <span id="logoName" class="text-xs text-muted-foreground" style="display: none; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
          <button type="button" id="pdfBtn" class="send-btn">
            Download branded PDF
          </button>
        </div>
      </div>
<div class="email-panel" id="emailPanel" style="display: none;">
        <label class="font-mono text-xs font-medium uppercase tracking-widest text-muted-foreground" for="emailInput">Email report</label>
        <form class="email-form flex flex-col sm:flex-row gap-2" id="emailForm" autocomplete="off">
          <input type="email" id="emailInput" placeholder="you@agency.com" required class="flex-1" />
          <button type="submit" class="send-btn" id="sendBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            <span id="sendLabel">Send report</span>
          </button>
        </form>
        <p class="status" id="emailStatus" style="display: none;"></p>
      </div>
    </main>

    <footer>
      <p class="font-mono text-muted-foreground">No data is stored. Summaries are generated locally.</p>
    </footer>
  </div>

  <script>
    const html = document.documentElement;
    const upload = document.getElementById('upload');
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const fileChip = document.getElementById('fileChip');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const clearBtn = document.getElementById('clearBtn');
    const goBtn = document.getElementById('goBtn');
    const statusEl = document.getElementById('status');
    const summaryCard = document.getElementById('summaryCard');
    const summaryList = document.getElementById('summaryList');
    const errorBanner = document.getElementById('errorBanner');
    const errorMsg = document.getElementById('errorMsg');
    const dismissError = document.getElementById('dismissError');
    const themeToggle = document.getElementById('themeToggle');
    const moonIcon = document.getElementById('moonIcon');
    const sunIcon = document.getElementById('sunIcon');
    const emailPanel = document.getElementById('emailPanel');
    const emailInput = document.getElementById('emailInput');
    const emailForm = document.getElementById('emailForm');
    const sendBtn = document.getElementById('sendBtn');
    const emailStatus = document.getElementById('emailStatus');
    const sendLabel = document.getElementById('sendLabel');
    const brandPanel = document.getElementById('brandPanel');
    const companyName = document.getElementById('companyName');
    const brandColor = document.getElementById('brandColor');
    const logoInput = document.getElementById('logoInput');
    const logoBtn = document.getElementById('logoBtn');
    const logoName = document.getElementById('logoName');
    const pdfBtn = document.getElementById('pdfBtn');



    let currentFile = null;
    let currentSummary = '';

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function setTheme(dark) {
      html.classList.toggle('dark', dark);
      moonIcon.style.display = dark ? 'none' : 'block';
      sunIcon.style.display = dark ? 'block' : 'none';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    const saved = localStorage.getItem('theme');
    setTheme(saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches));
    themeToggle.onclick = () => setTheme(!html.classList.contains('dark'));

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBanner.style.display = '';
    }

    function hideError() {
      errorBanner.style.display = 'none';
    }
    dismissError.onclick = hideError;

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.style.display = '';
    }

    function hideStatus() {
      statusEl.style.display = 'none';
      statusEl.textContent = '';
    }

    function resetUpload(clearInput = true) {
      currentFile = null;
      if (clearInput) fileInput.value = '';
      upload.style.display = '';
      fileChip.style.display = 'none';
      goBtn.disabled = true;
      hideStatus();
      summaryCard.classList.remove('show');
      brandPanel.style.display = 'none';
      emailPanel.style.display = 'none';
      hideError();
      uploadText.textContent = 'Drop your CSV here';
      if (logoInput) logoInput.value = '';
      if (logoName) logoName.style.display = 'none';
    }

    function handleFile(f) {
      if (!f) return;
      if (!f.name.toLowerCase().endsWith('.csv')) {
        showError('Only .csv files are accepted. Please choose a different file.');
        resetUpload();
        return;
      }
      hideError();
      currentFile = f;
      upload.style.display = 'none';
      fileChip.style.display = '';
      fileName.textContent = f.name;
      fileSize.textContent = formatBytes(f.size);
      goBtn.disabled = false;
    }

    upload.addEventListener('dragover', (e) => {
      e.preventDefault();
      upload.classList.add('drag-over');
      uploadText.textContent = 'Release to upload';
    });
    upload.addEventListener('dragleave', () => {
      upload.classList.remove('drag-over');
      uploadText.textContent = 'Drop your CSV here';
    });
    upload.addEventListener('drop', (e) => {
      e.preventDefault();
      upload.classList.remove('drag-over');
      uploadText.textContent = 'Drop your CSV here';
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });
    clearBtn.onclick = () => resetUpload();

    goBtn.onclick = async () => {
      if (!currentFile) return;
      const form = new FormData();
      form.append('file', currentFile);
      goBtn.disabled = true;
      hideError();
      hideStatus();
      summaryCard.classList.remove('show');
      emailPanel.style.display = 'none';
      showStatus('Reading CSV and generating summary…');
      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch {
          throw new Error('Server returned an invalid response. Please try again or check the deployment.');
        }
        if (!res.ok) throw new Error(data.error || 'Failed');
        const lines = (data.summary || '').split('\n').filter(Boolean);
        summaryList.innerHTML = '';
        lines.forEach((line) => {
          const li = document.createElement('li');
          const dot = document.createElement('span');
          dot.className = 'dot';
          const p = document.createElement('p');
          p.className = 'text-sm leading-relaxed text-foreground';
          p.textContent = line.replace(/^•\s?/, '').trim();
          li.appendChild(dot);
          li.appendChild(p);
          summaryList.appendChild(li);
        });
        showStatus('Analyzed ' + (data.rows_analyzed || 0).toLocaleString() + ' rows');
        currentSummary = data.summary || '';
        summaryCard.classList.add('show');
        brandPanel.style.display = '';
        emailPanel.style.display = '';
      } catch (e) {
        hideStatus();
        showError('Error: ' + e.message);
      } finally {
        goBtn.disabled = false;
      }
    };

    emailForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      if (!email || !email.includes('@')) {
        emailStatus.textContent = 'Please enter a valid email address.';
        emailStatus.style.display = '';
        return;
      }
      const summary = currentSummary;
      if (!summary) return;
      sendBtn.disabled = true;
      sendLabel.textContent = 'Sending…';
      hideError();
      emailStatus.style.display = 'none';
      try {
        const res = await fetch('/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, summary }),
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = {}; }
        if (!res.ok) throw new Error(data.error || 'Failed to send email');
        emailStatus.textContent = 'Report sent to ' + email;
        emailStatus.style.display = '';
        emailInput.value = '';
      } catch (e) {
        emailStatus.textContent = 'Error: ' + e.message;
        emailStatus.style.display = '';
      } finally {
        sendBtn.disabled = false;
        sendLabel.textContent = 'Send report';
      }
    });


    logoBtn.onclick = () => logoInput.click();
    logoInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        logoName.textContent = e.target.files[0].name;
        logoName.style.display = '';
      }
    });

    pdfBtn.onclick = async () => {
      const company = (companyName.value || '').trim();
      const color = brandColor.value;
      const logoFile = logoInput.files[0];
      const summary = currentSummary;
      if (!company || !color || !summary) {
        alert('Please enter your company name, pick a brand color, and upload a CSV first.');
        return;
      }

      let logoDataUrl = null;
      if (logoFile) {
        logoDataUrl = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(logoFile);
        });
      }

      pdfBtn.disabled = true;
      pdfBtn.textContent = 'Generating…';
      try {
        const logoImg = logoDataUrl
          ? `<img src="${logoDataUrl}" style="max-height:60px;max-width:180px;object-fit:contain;margin-bottom:20px;display:block;" />`
          : '';
        const safeSummary = summary
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>');
        const safeCompany = company
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        const bodyHtml = `
          <div style="font-family:Inter,ui-sans-serif,system-ui,sans-serif;color:#111;padding:40px;font-size:14px;">
            <div style="background:${color};height:6px;border-radius:3px;margin-bottom:24px;"></div>
            ${logoImg}
            <div style="font-size:12px;font-weight:600;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;">Performance Report</div>
            <div style="font-size:22px;font-weight:600;color:#111;margin-bottom:20px;">${safeCompany}</div>
            <div style="font-size:13px;font-weight:600;color:${color};margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;">Summary</div>
            <div style="font-size:14px;line-height:1.65;color:#333;">${safeSummary}</div>
            <div style="margin-top:60px;font-size:11px;color:#999;border-top:1px solid #eee;padding-top:16px;">Prepared for ${safeCompany}</div>
          </div>`;

        const reportDiv = document.createElement('div');
        reportDiv.innerHTML = bodyHtml;
        reportDiv.style.position = 'absolute';
        reportDiv.style.left = '-9999px';
        reportDiv.style.top = '0';
        reportDiv.style.background = '#fff';
        reportDiv.style.width = '800px';
        reportDiv.style.minHeight = '1000px';
        reportDiv.style.visibility = 'hidden';
        document.body.appendChild(reportDiv);

        const opt = {
          margin: 0,
          filename: `${company.replace(/[^a-z0-9]/gi, '-').toLowerCase()}-report.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 1, useCORS: true },
          jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['css', 'legacy'] }
        };

        await html2pdf().set(opt).from(reportDiv).save();
        document.body.removeChild(reportDiv);
      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        pdfBtn.disabled = false;
        pdfBtn.textContent = 'Download branded PDF';
      }
    };
  </script>
</body>
</html>
