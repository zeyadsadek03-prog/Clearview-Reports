<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clearview Reports</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; }
    .drop { border: 2px dashed #888; padding: 40px; text-align: center; border-radius: 10px; margin: 20px 0; }
    .drop.dragover { border-color: #000; background: #f0f0f0; }
    button { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; }
    #preview { white-space: pre-wrap; background: #f5f5f5; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Clearview Reports</h1>
  <p>Upload a CSV and get a plain-English summary.</p>

  <div id="drop" class="drop">
    <p>Drag & drop CSV here, or click to browse</p>
    <input type="file" id="file" accept=".csv" hidden />
  </div>

  <button id="go" disabled>Summarize</button>
  <div id="status"></div>
  <pre id="preview"></pre>

  <script>
    const drop = document.getElementById('drop');
    const input = document.getElementById('file');
    const go = document.getElementById('go');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    drop.onclick = () => input.click();
    input.onchange = () => go.disabled = false;

    drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('dragover'); };
    drop.ondragleave = () => drop.classList.remove('dragover');
    drop.ondrop = (e) => {
      e.preventDefault();
      drop.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        go.disabled = false;
      }
    };

    go.onclick = async () => {
      const form = new FormData();
      form.append('file', input.files[0]);
      status.textContent = 'Working...';
      go.disabled = true;
      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        preview.textContent = data.summary;
        status.textContent = `Done. Analyzed up to ${data.rows_analyzed} rows.`;
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      } finally {
        go.disabled = false;
      }
    };
  </script>
</body>
</html>
